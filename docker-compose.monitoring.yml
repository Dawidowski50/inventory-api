services:
  prometheus:
    image: prom/prometheus:v3.4.0
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.6.0
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

