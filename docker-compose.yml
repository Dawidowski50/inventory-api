services:
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    environment:
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DB=inventory
      - MONGODB_COLLECTION=products
    ports:
      - "8000:8000"
    depends_on:
      - mongo

volumes:
  mongo_data:

